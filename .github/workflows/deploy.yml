name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Usagi
        run: |
          curl -fsSL https://usagiengine.com/install.sh | sh
          echo "$HOME/.usagi/bin" >> "$GITHUB_PATH"

      - name: Verify Usagi install
        run: |
          which usagi
          usagi --version || usagi version || true

      - name: Export web build
        run: |
          usagi export --target web
          echo "=== Files produced (zips) ==="
          find . -path ./.git -prune -o -name '*.zip' -print
          echo "=== export/ tree ==="
          ls -laR export 2>/dev/null || echo "(no export/ dir)"

      - name: Stage site
        run: |
          # Locate the web export zip wherever usagi put it.
          zip=$(find . -path ./.git -prune -o -name '*-web.zip' -print | head -n1)
          if [ -z "$zip" ]; then
            echo "ERROR: no *-web.zip found after export." >&2
            exit 1
          fi
          echo "Unzipping $zip"
          mkdir -p _site
          unzip -o "$zip" -d _site
          # If the zip nested everything under a folder, lift it to the root.
          if [ ! -f _site/index.html ]; then
            idx=$(find _site -name index.html | head -n1)
            if [ -n "$idx" ]; then
              nested=$(dirname "$idx")
              mv "$nested"/* _site/
            fi
          fi
          ls -la _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
